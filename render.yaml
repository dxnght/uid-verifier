services:
  - type: web
    name: uid-verifier
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install -g pnpm@9.12.0 && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEFAULT_COMMUNITY_ID
        sync: false
      - key: WEBHOOK_DOMAIN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: OPERATOR_IDS
        sync: false
